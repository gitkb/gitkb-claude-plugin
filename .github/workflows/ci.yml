name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lint
        run: make lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve gitkb-core HEAD
        id: gitkb-rev
        run: echo "sha=$(git ls-remote https://github.com/harmony-labs/gitkb-core.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache git-kb binary
        id: cache-gitkb
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/git-kb
          key: gitkb-${{ runner.os }}-${{ steps.gitkb-rev.outputs.sha }}

      - name: Install Rust toolchain
        if: steps.cache-gitkb.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build git-kb from source
        if: steps.cache-gitkb.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/harmony-labs/gitkb-core.git /tmp/gitkb-core
          cargo install --path /tmp/gitkb-core/crates/gitkb-cli --root ~/.local

      - name: Add git-kb to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install test deps
        run: brew install bats-core parallel

      - name: Verify git-kb
        run: git-kb --version

      - name: Configure git
        run: |
          git config --global user.email "ci@gitkb.com"
          git config --global user.name "CI"

      - name: Run tests
        run: make test
