name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lint
        run: make lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install git-kb
        run: |
          curl -fsSL https://get.gitkb.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify git-kb
        run: git-kb --version

      - name: Install bats-core and parallel
        run: brew install bats-core parallel

      - name: Configure git
        run: |
          git config --global user.email "ci@gitkb.com"
          git config --global user.name "CI"

      - name: Run tests
        run: make test
