name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lint
        run: make lint

  test:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install git-kb from source
        run: |
          INSTALL_DIR="${RUNNER_TEMP}/gitkb-bin"
          SRC="${RUNNER_TEMP}/gitkb-src"
          mkdir -p "$INSTALL_DIR" "$SRC/vendor"
          git clone --depth 1 https://github.com/harmony-labs/gitkb-core.git "$SRC/gitkb-core"
          git clone --depth 1 https://github.com/harmony-labs/tree-sitter-markdown.git "$SRC/vendor/tree-sitter-markdown"
          cargo install --path "$SRC/gitkb-core/crates/gitkb-cli" --root "$INSTALL_DIR"
          rm -rf "$SRC"
          echo "$INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Verify git-kb
        run: git-kb --version

      - name: Configure git
        run: |
          git config --global user.email "ci@gitkb.com"
          git config --global user.name "CI"

      - name: Run tests
        run: make test
