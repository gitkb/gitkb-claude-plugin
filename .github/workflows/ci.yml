name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lint
        run: make lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install git-kb and test deps
        run: brew install gitkb/tap/gitkb bats-core parallel

      - name: Verify git-kb
        run: git-kb --version

      - name: Configure git
        run: |
          git config --global user.email "ci@gitkb.com"
          git config --global user.name "CI"

      - name: Run tests
        run: make test
