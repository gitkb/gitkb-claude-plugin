name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lint
        run: make lint

  test:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install git-kb from source
        run: |
          git clone --depth 1 https://github.com/harmony-labs/gitkb-core.git /tmp/gitkb-core-$$
          cargo install --path /tmp/gitkb-core-$$/crates/gitkb-cli --root ~/.local
          rm -rf /tmp/gitkb-core-$$
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify git-kb
        run: git-kb --version

      - name: Configure git
        run: |
          git config --global user.email "ci@gitkb.com"
          git config --global user.name "CI"

      - name: Run tests
        run: make test
